spring:
  application:
    name: algorithm-sm2
  datasource:
    url: jdbc:postgresql://localhost:5432/sm2_db
    username: ${DB_USER:sm2user}
    password: ${DB_PASS:sm2pass}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
      auto-commit: false

    jpa:
      hibernate:
        ddl-auto: validate
      properties:
        hibernate:
          dialect: org.hibernate.dialect.PostgreSQLDialect
          jdbc.batch_size: 50
          order_inserts: true
          order_updates: true
          generate_statistics: false
          default_schema: public
      open-in-view: false
      show-sql: false

    data:
      redis:
        host: ${REDIS_HOST:localhost}
        port: ${REDIS_PORT:6379}
        password: ${REDIS_PASS:}
        lettuce:
          pool:
            max-active: 20
            max-idle: 10
            min-idle: 2

    cache:
      type: redis
      redis:
        time-to-live: 300000  # 5 min

  server:
    port: 8080
    compression:
      enabled: true
    tomcat:
      threads:
        max: 200
        min-spare: 10

  management:
    endpoints:
      web:
        exposure:
          include: health,info,metrics,prometheus
    metrics:
      export:
        prometheus:
          enabled: true

  springdoc:
    api-docs:
      path: /api-docs
    swagger-ui:
      path: /swagger-ui.html
      operationsSorter: method

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true

  app:
    sm2:
      default-ease-factor: 2.5
      min-ease-factor: 1.3
      graduating-interval: 1
      easy-interval: 4
      new-cards-per-day: 20
      max-reviews-per-day: 200
    scheduler:
      review-check-cron: "0 */5 * * * *"
      batch-size: 500
